<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>실시간 빙고 게임</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
  :root{
    --primary:#5b4bda; --primary-dark:#4338ca; --bg:#f4f3ff; --card:#ffffff;
    --text:#1f1b3c; --muted:#7a7593; --danger:#e0445b; --success:#2fb380; --border:#e3e0f7;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Segoe UI',Apple SD Gothic Neo,sans-serif;background:var(--bg);color:var(--text);}
  .wrap{max-width:560px;margin:0 auto;padding:16px 16px 60px;}
  .wrap.wide{max-width:900px;}
  h1{font-size:22px;text-align:center;margin:18px 0 6px;}
  .sub{text-align:center;color:var(--muted);font-size:13px;margin-bottom:18px;}
  .card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(91,75,218,0.06);}
  .tabs{display:flex;gap:8px;margin-bottom:16px;}
  .tab-btn{flex:1;padding:12px;border:none;border-radius:12px;background:#eceaff;color:var(--primary-dark);font-weight:600;cursor:pointer;font-size:14px;}
  .tab-btn.active{background:var(--primary);color:#fff;}
  label{display:block;font-size:13px;font-weight:600;color:var(--muted);margin:10px 0 4px;}
  input,select,textarea{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:10px;font-size:14px;font-family:inherit;}
  textarea{resize:vertical;min-height:80px;}
  button.btn{width:100%;padding:13px;border:none;border-radius:12px;background:var(--primary);color:#fff;font-weight:700;font-size:15px;cursor:pointer;margin-top:10px;}
  button.btn:hover{background:var(--primary-dark);}
  button.btn.secondary{background:#eceaff;color:var(--primary-dark);}
  button.btn.danger{background:var(--danger);}
  .hidden{display:none !important;}
  .room-code{font-size:32px;font-weight:800;text-align:center;letter-spacing:4px;color:var(--primary);margin:10px 0;}
  .pill{display:inline-block;padding:4px 10px;border-radius:999px;background:#eceaff;color:var(--primary-dark);font-size:12px;font-weight:700;margin-right:6px;}
  .word-bank{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0;}
  .word-chip{padding:8px 14px;border-radius:10px;background:#eceaff;border:1px solid var(--border);cursor:pointer;font-size:14px;font-weight:600;color:var(--primary-dark);}
  .word-chip.used{opacity:0.3;pointer-events:none;}
  .bingo-grid{display:grid;gap:6px;margin:14px 0;}
  .cell{aspect-ratio:1;border:2px solid var(--border);border-radius:10px;display:flex;align-items:center;justify-content:center;text-align:center;font-size:13px;font-weight:700;cursor:pointer;background:#fff;padding:4px;word-break:keep-all;line-height:1.2;}
  .cell.filled{background:#f8f7ff;}
  .cell.checked{background:var(--primary);color:#fff;border-color:var(--primary-dark);}
  .cell.empty{color:var(--muted);font-weight:400;cursor:default;}
  .status-banner{text-align:center;padding:10px;border-radius:10px;font-weight:700;margin-bottom:10px;}
  .status-banner.ok{background:#e6f8f0;color:var(--success);}
  .status-banner.out{background:#fdeaec;color:var(--danger);}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  th,td{padding:8px 6px;border-bottom:1px solid var(--border);text-align:left;}
  th{color:var(--muted);font-size:12px;}
  tr.win td{font-weight:800;color:var(--primary-dark);background:#f4f3ff;}
  tr.dq td{color:var(--danger);text-decoration:line-through;opacity:0.6;}
  .called-list{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0;}
  .called-tag{padding:5px 10px;border-radius:999px;background:var(--primary);color:#fff;font-size:12px;font-weight:700;}
  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  @media (max-width:640px){.two-col{grid-template-columns:1fr;}}
  .small-muted{font-size:12px;color:var(--muted);}
  .qr-box{text-align:center;margin:10px 0;}
  .copy-row{display:flex;gap:8px;}
  .copy-row input{flex:1;}
  .copy-row button{width:auto;padding:10px 14px;margin-top:0;}
</style>
</head>
<body>

<div class="wrap" id="entryWrap">
  <h1>🎯 실시간 빙고</h1>
  <div class="sub">행사 진행자라면 [방 만들기], 참가자라면 [참가하기]</div>
  <div class="tabs">
    <button class="tab-btn active" id="tabHost">👑 방 만들기 (진행자)</button>
    <button class="tab-btn" id="tabPlayer">🙋 참가하기</button>
  </div>

  <!-- HOST CREATE -->
  <div class="card" id="hostCreatePanel">
    <label>빙고 칸수</label>
    <select id="sizeSelect">
      <option value="3">3 x 3 (9칸)</option>
      <option value="4" selected>4 x 4 (16칸)</option>
      <option value="5">5 x 5 (25칸)</option>
    </select>
    <label>빙고 완성 기준 (몇 줄 완성 시 빙고)</label>
    <select id="winSelect">
      <option value="1">1줄 완성</option>
      <option value="2">2줄 완성</option>
      <option value="3" selected>3줄 완성</option>
    </select>
    <label>단어/숫자 목록 (한 줄에 하나씩, 칸수의 제곱 이상 입력 / 예: 4x4면 16개 이상)</label>
    <textarea id="wordInput" placeholder="예시
회식
워크숍
신입사원
야근
연봉협상
..."></textarea>
    <div class="small-muted" id="wordCountInfo">입력된 단어: 0개</div>
    <button class="btn" id="createRoomBtn">방 만들기</button>
  </div>

  <!-- PLAYER JOIN -->
  <div class="card hidden" id="playerJoinPanel">
    <label>방 코드</label>
    <input id="joinRoomCode" placeholder="예: 4821" maxlength="4" inputmode="numeric">
    <label>이름 (본명으로 입력해주세요)</label>
    <input id="joinName" placeholder="홍길동">
    <button class="btn" id="joinRoomBtn">입장하기</button>
    <div class="small-muted" id="joinError" style="color:var(--danger);margin-top:8px;"></div>
  </div>
</div>

<!-- ===================== HOST DASHBOARD ===================== -->
<div class="wrap wide hidden" id="hostDashboard">
  <h1>👑 진행자 화면</h1>
  <div class="card">
    <div style="text-align:center;">
      <span class="pill">방 코드</span>
      <div class="room-code" id="dashRoomCode">----</div>
      <div class="copy-row">
        <input id="dashJoinUrl" readonly>
        <button class="btn secondary" id="copyUrlBtn">URL 복사</button>
      </div>
      <div class="qr-box small-muted">참가자는 위 URL로 접속하거나, 방 코드를 직접 입력하면 됩니다.</div>
    </div>
  </div>

  <div class="two-col">
    <div class="card">
      <h3 style="margin-top:0;">🎰 단어 추첨기</h3>
      <div id="drawResultBox" style="text-align:center;font-size:28px;font-weight:800;color:var(--primary-dark);padding:20px 0;min-height:1.4em;">눌러서 뽑기!</div>
      <button class="btn" id="callWordBtn">🎲 단어 뽑기!</button>
      <div class="small-muted" id="remainingInfo" style="text-align:center;margin-top:6px;"></div>
      <label style="margin-top:14px;">호출된 단어 (<span id="calledCount">0</span>개)</label>
      <div class="called-list" id="calledListBox"></div>
    </div>

    <div class="card">
      <h3 style="margin-top:0;">🏆 실시간 순위 / 참가자 현황</h3>
      <div class="small-muted" style="margin-bottom:6px;">접속자 <span id="playerCount">0</span>명</div>
      <table>
        <thead><tr><th>순위</th><th>이름</th><th>체크 수</th><th>상태</th></tr></thead>
        <tbody id="rankTableBody"></tbody>
      </table>
    </div>
  </div>

  <div class="card">
    <button class="btn danger" id="resetRoomBtn">방 초기화 (새 게임)</button>
  </div>
</div>

<!-- ===================== PLAYER SCREEN ===================== -->
<div class="wrap hidden" id="playerScreen">
  <h1>🎯 <span id="pRoomLabel"></span></h1>
  <div id="pBanner"></div>

  <!-- Step 1: build board -->
  <div class="card" id="boardBuildCard">
    <div class="sub" style="margin-top:-6px;">아래 단어를 눌러서 내 빙고판을 순서대로 채워주세요</div>
    <div class="word-bank" id="wordBankBox"></div>
    <div class="bingo-grid" id="buildGrid"></div>
    <button class="btn hidden" id="lockBoardBtn">빙고판 완성!</button>
  </div>

  <!-- Step 2: play -->
  <div class="card hidden" id="playCard">
    <div class="small-muted" style="margin-bottom:6px;">진행자가 부른 단어만 체크하세요. 안 부른 단어를 누르면 <b>즉시 탈락</b>됩니다.</div>
    <div class="bingo-grid" id="playGrid"></div>
  </div>
</div>

<script>
/* =======================================================================
  ⚠️ 아래 firebaseConfig 부분에 본인의 Firebase 프로젝트 설정값을 붙여넣으세요.
  (Firebase 콘솔 > 프로젝트 설정 > 일반 > 내 앱 > SDK 설정 및 구성 에서 복사)
======================================================================= */
const firebaseConfig = {
  apiKey: "AIzaSyBagSV-mmRykgR5dZ8oQJW-aMFClS13Ojw",
  authDomain: "company-bingo-e8ea2.firebaseapp.com",
  databaseURL: "https://company-bingo-e8ea2-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "company-bingo-e8ea2",
  storageBucket: "company-bingo-e8ea2.firebasestorage.app",
  messagingSenderId: "318440692637",
  appId: "1:318440692637:web:170c86c3bcbbbf33056d74",
  measurementId: "G-9NDMF44S46"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* ---------------- 공통 유틸 ---------------- */
function genRoomCode(){ return String(Math.floor(1000 + Math.random()*9000)); }
function genPlayerId(){ return 'p_' + Math.random().toString(36).slice(2,10); }
function shuffle(arr){ const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

let myRoomCode = null;
let myPlayerId = null;
let mySize = 4;
let myWinLines = 3;
let myBoardWords = [];     // 내가 배치한 단어들 (좌->우, 위->아래)
let myWordPool = [];       // 진행자가 등록한 전체 단어 풀 (선택 순서대로)
let pickedWords = [];      // 빌드 단계에서 내가 클릭해서 채운 순서

/* ---------------- 진입 화면 탭 전환 ---------------- */
document.getElementById('tabHost').onclick = ()=>{
  document.getElementById('tabHost').classList.add('active');
  document.getElementById('tabPlayer').classList.remove('active');
  document.getElementById('hostCreatePanel').classList.remove('hidden');
  document.getElementById('playerJoinPanel').classList.add('hidden');
};
document.getElementById('tabPlayer').onclick = ()=>{
  document.getElementById('tabPlayer').classList.add('active');
  document.getElementById('tabHost').classList.remove('active');
  document.getElementById('playerJoinPanel').classList.remove('hidden');
  document.getElementById('hostCreatePanel').classList.add('hidden');
};

document.getElementById('wordInput').addEventListener('input', (e)=>{
  const words = e.target.value.split('\n').map(w=>w.trim()).filter(Boolean);
  document.getElementById('wordCountInfo').textContent = `입력된 단어: ${words.length}개`;
});

/* ---------------- URL 파라미터로 자동 참가 (?room=1234) ---------------- */
window.addEventListener('DOMContentLoaded', ()=>{
  const params = new URLSearchParams(location.search);
  const roomParam = params.get('room');
  if(roomParam){
    document.getElementById('tabPlayer').click();
    document.getElementById('joinRoomCode').value = roomParam;
  }
});

/* =========================================================
   1) 호스트: 방 만들기
========================================================= */
document.getElementById('createRoomBtn').onclick = async ()=>{
  const size = parseInt(document.getElementById('sizeSelect').value);
  const winLines = parseInt(document.getElementById('winSelect').value);
  const words = document.getElementById('wordInput').value.split('\n').map(w=>w.trim()).filter(Boolean);
  const needed = size*size;
  if(words.length < needed){
    alert(`단어가 부족합니다. ${size}x${size} 빙고에는 최소 ${needed}개의 단어가 필요합니다. (현재 ${words.length}개)`);
    return;
  }
  const roomCode = genRoomCode();
  await db.ref('rooms/'+roomCode).set({
    size, winLines,
    words,
    calledWords: {},
    status: 'building', // building -> playing -> ended
    createdAt: firebase.database.ServerValue.TIMESTAMP
  });
  myRoomCode = roomCode;
  enterHostDashboard(roomCode, size, words);
};

function enterHostDashboard(roomCode, size, words){
  document.getElementById('entryWrap').classList.add('hidden');
  document.getElementById('hostDashboard').classList.remove('hidden');
  document.getElementById('dashRoomCode').textContent = roomCode;
  const joinUrl = location.origin + location.pathname + '?room=' + roomCode;
  document.getElementById('dashJoinUrl').value = joinUrl;
  document.getElementById('copyUrlBtn').onclick = ()=>{
    navigator.clipboard.writeText(joinUrl);
    alert('URL이 복사되었습니다. PPT에 붙여넣으세요.');
  };

  document.getElementById('remainingInfo').textContent = `남은 단어: ${words.length}개`;

  document.getElementById('callWordBtn').onclick = async ()=>{
    const calledSnap = await db.ref(`rooms/${roomCode}/calledWords`).get();
    const calledData = calledSnap.val() || {};
    const remaining = words.filter(w => !(w in calledData));
    if(remaining.length === 0){
      document.getElementById('drawResultBox').textContent = '🎉 모든 단어 소진!';
      document.getElementById('remainingInfo').textContent = '남은 단어: 0개';
      return;
    }
    const picked = remaining[Math.floor(Math.random()*remaining.length)];
    await db.ref(`rooms/${roomCode}/calledWords/${picked}`).set(firebase.database.ServerValue.TIMESTAMP);

    const box = document.getElementById('drawResultBox');
    box.textContent = '🎲 ...';
    let spins = 0;
    const spinInterval = setInterval(()=>{
      box.textContent = remaining[Math.floor(Math.random()*remaining.length)];
      spins++;
      if(spins > 10){
        clearInterval(spinInterval);
        box.textContent = picked;
      }
    }, 60);

    document.getElementById('remainingInfo').textContent = `남은 단어: ${remaining.length-1}개`;
    checkAllBingosForRoom(roomCode);
  };

  document.getElementById('resetRoomBtn').onclick = async ()=>{
    if(!confirm('정말 방을 초기화할까요? 모든 참가자 데이터가 사라집니다.')) return;
    await db.ref('rooms/'+roomCode).remove();
    location.reload();
  };

  // 실시간 호출 단어 표시
  db.ref(`rooms/${roomCode}/calledWords`).on('value', snap=>{
    const data = snap.val() || {};
    const list = Object.keys(data).sort((a,b)=>data[a]-data[b]);
    document.getElementById('calledCount').textContent = list.length;
    document.getElementById('calledListBox').innerHTML = list.map(w=>`<span class="called-tag">${w}</span>`).join('');
  });

  // 실시간 참가자 / 순위 표시
  db.ref(`rooms/${roomCode}/players`).on('value', snap=>{
    const players = snap.val() || {};
    const arr = Object.values(players);
    document.getElementById('playerCount').textContent = arr.length;
    const sorted = [...arr].sort((a,b)=>{
      if(!!a.disqualified !== !!b.disqualified) return a.disqualified?1:-1;
      if((b.bingoCount||0) !== (a.bingoCount||0)) return (b.bingoCount||0)-(a.bingoCount||0);
      const at = a.bingoSubmittedAt || Infinity, bt = b.bingoSubmittedAt || Infinity;
      return at-bt;
    });
    document.getElementById('rankTableBody').innerHTML = sorted.map((p,i)=>{
      const cls = p.disqualified ? 'dq' : (i===0 && p.bingoCount>0 ? 'win' : '');
      const status = p.disqualified ? '❌ 탈락' : (p.bingoCount>0 ? `✅ 빙고 (${i===0?'🥇 1등':i+1+'등'})` : '진행중');
      return `<tr class="${cls}"><td>${i+1}</td><td>${escapeHtml(p.name||'-')}</td><td>${p.checkedCount||0}</td><td>${status}</td></tr>`;
    }).join('');
  });
}

function escapeHtml(s){ const d=document.createElement('div'); d.innerText=s; return d.innerHTML; }

/* =========================================================
   2) 참가자: 입장
========================================================= */
document.getElementById('joinRoomBtn').onclick = async ()=>{
  const code = document.getElementById('joinRoomCode').value.trim();
  const name = document.getElementById('joinName').value.trim();
  const errBox = document.getElementById('joinError');
  errBox.textContent='';
  if(!code || !name){ errBox.textContent='방 코드와 이름을 모두 입력해주세요.'; return; }

  const roomSnap = await db.ref('rooms/'+code).get();
  if(!roomSnap.exists()){ errBox.textContent='존재하지 않는 방 코드입니다.'; return; }
  const room = roomSnap.val();

  myRoomCode = code;
  myPlayerId = genPlayerId();
  mySize = room.size;
  myWinLines = room.winLines;
  myWordPool = room.words;

  await db.ref(`rooms/${code}/players/${myPlayerId}`).set({
    name, board: [], checked: {}, checkedCount:0, disqualified:false, bingoCount:0, joinedAt: firebase.database.ServerValue.TIMESTAMP
  });

  enterPlayerScreen();
};

function enterPlayerScreen(){
  document.getElementById('entryWrap').classList.add('hidden');
  document.getElementById('playerScreen').classList.remove('hidden');
  document.getElementById('pRoomLabel').textContent = `방 ${myRoomCode}`;
  renderWordBank();
  renderBuildGrid();

  // 호출된 단어가 갱신될 때마다 내 보드 자동 반영(체크는 본인이 직접 눌러야 하므로 표시만)
  db.ref(`rooms/${myRoomCode}/calledWords`).on('value', snap=>{
    window._calledWordsCache = snap.val() || {};
  });

  // 강제 탈락/방 종료 등 상태 변화 감시
  db.ref(`rooms/${myRoomCode}/status`).on('value', snap=>{
    if(snap.val()==='ended'){
      showBanner('진행자가 게임을 종료했습니다.','out');
    }
  });
}

function renderWordBank(){
  const box = document.getElementById('wordBankBox');
  box.innerHTML = myWordPool.map(w=>`<div class="word-chip" data-word="${escapeHtml(w)}">${escapeHtml(w)}</div>`).join('');
  box.querySelectorAll('.word-chip').forEach(chip=>{
    chip.onclick = ()=>{
      if(pickedWords.length >= mySize*mySize) return;
      pickedWords.push(chip.dataset.word);
      chip.classList.add('used');
      renderBuildGrid();
    };
  });
}

function renderBuildGrid(){
  const grid = document.getElementById('buildGrid');
  grid.style.gridTemplateColumns = `repeat(${mySize}, 1fr)`;
  let html='';
  for(let i=0;i<mySize*mySize;i++){
    const w = pickedWords[i];
    html += `<div class="cell ${w?'filled':'empty'}">${w?escapeHtml(w):''}</div>`;
  }
  grid.innerHTML = html;
  if(pickedWords.length === mySize*mySize){
    document.getElementById('lockBoardBtn').classList.remove('hidden');
  } else {
    document.getElementById('lockBoardBtn').classList.add('hidden');
  }
}

document.getElementById('lockBoardBtn').onclick = async ()=>{
  myBoardWords = [...pickedWords];
  await db.ref(`rooms/${myRoomCode}/players/${myPlayerId}/board`).set(myBoardWords);
  document.getElementById('boardBuildCard').classList.add('hidden');
  document.getElementById('playCard').classList.remove('hidden');
  renderPlayGrid();
};

function renderPlayGrid(){
  const grid = document.getElementById('playGrid');
  grid.style.gridTemplateColumns = `repeat(${mySize}, 1fr)`;
  grid.innerHTML = myBoardWords.map((w,idx)=>
    `<div class="cell filled" data-idx="${idx}" data-word="${escapeHtml(w)}">${escapeHtml(w)}</div>`
  ).join('');

  grid.querySelectorAll('.cell').forEach(cell=>{
    cell.onclick = async ()=>{
      if(cell.classList.contains('checked')) return;
      const word = cell.dataset.word;
      const called = window._calledWordsCache || {};
      if(!(word in called)){
        // 호출되지 않은 단어를 임의로 클릭 -> 즉시 탈락
        await db.ref(`rooms/${myRoomCode}/players/${myPlayerId}`).update({disqualified:true});
        showBanner('🚫 호출되지 않은 단어를 체크해서 탈락 처리되었습니다.','out');
        grid.querySelectorAll('.cell').forEach(c=>c.style.pointerEvents='none');
        return;
      }
      cell.classList.add('checked');
      const idx = parseInt(cell.dataset.idx);
      const checkedSnap = await db.ref(`rooms/${myRoomCode}/players/${myPlayerId}/checked`).get();
      const checked = checkedSnap.val() || {};
      checked[idx] = true;
      const checkedCount = Object.keys(checked).length;
      await db.ref(`rooms/${myRoomCode}/players/${myPlayerId}`).update({checked, checkedCount});

      const lines = countCompletedLines(checked, mySize);
      if(lines >= myWinLines){
        const playerSnap = await db.ref(`rooms/${myRoomCode}/players/${myPlayerId}`).get();
        if(!playerSnap.val().bingoCount){
          await db.ref(`rooms/${myRoomCode}/players/${myPlayerId}`).update({
            bingoCount: lines,
            bingoSubmittedAt: firebase.database.ServerValue.TIMESTAMP
          });
          showBanner(`🎉 빙고 완성! (${lines}줄) 제출되었습니다.`,'ok');
        }
      }
    };
  });
}

function countCompletedLines(checked, size){
  let lines=0;
  // 가로
  for(let r=0;r<size;r++){
    let ok=true;
    for(let c=0;c<size;c++){ if(!checked[r*size+c]){ok=false;break;} }
    if(ok) lines++;
  }
  // 세로
  for(let c=0;c<size;c++){
    let ok=true;
    for(let r=0;r<size;r++){ if(!checked[r*size+c]){ok=false;break;} }
    if(ok) lines++;
  }
  // 대각선
  let ok1=true, ok2=true;
  for(let i=0;i<size;i++){
    if(!checked[i*size+i]) ok1=false;
    if(!checked[i*size+(size-1-i)]) ok2=false;
  }
  if(ok1) lines++;
  if(ok2) lines++;
  return lines;
}

function showBanner(text, type){
  const el = document.getElementById('pBanner');
  el.innerHTML = `<div class="status-banner ${type==='ok'?'ok':'out'}">${text}</div>`;
}
